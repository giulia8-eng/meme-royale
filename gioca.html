<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Entra nel gioco</title>

  <style>
    /* SFONDO E STRUTTURA */
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff0080, #ff8c00);
      color: white;
      text-align: center;
      padding: 60px 20px;
      animation: fadeIn 0.8s ease-out;
    }

    /* ANIMAZIONE DI ENTRATA */
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 46px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
      animation: pop 0.6s ease-out;
    }

    @keyframes pop {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    p {
      font-size: 20px;
      margin-bottom: 30px;
      opacity: 0.9;
    }

    /* INPUT NOME */
    input {
      width: 260px;
      padding: 14px;
      font-size: 20px;
      border-radius: 12px;
      border: none;
      outline: none;
      margin-bottom: 20px;
      text-align: center;
      box-shadow: 0 0 12px rgba(255,255,255,0.4);
      transition: 0.2s;
    }

    input:focus {
      transform: scale(1.05);
      box-shadow: 0 0 18px rgba(255,255,255,0.7);
    }

    /* PULSANTE */
    .btn {
      display: block;
      width: 260px;
      margin: 15px auto;
      padding: 15px;
      background: white;
      color: #ff0080;
      font-size: 22px;
      font-weight: bold;
      border-radius: 14px;
      text-decoration: none;
      transition: 0.25s;
      box-shadow: 0 0 12px rgba(255,255,255,0.4);
    }

    .btn:hover {
      transform: scale(1.1);
      background: #ffe6f7;
      box-shadow: 0 0 18px rgba(255,255,255,0.7);
    }

    /* RESPONSIVE PER TELEFONO */
    @media (max-width: 600px) {
      body {
        padding-top: 30px;
      }

      h1 {
        font-size: 34px;
      }

      p {
        font-size: 16px;
      }

      input {
        width: 200px;
        font-size: 18px;
      }

      .btn {
        width: 200px;
        font-size: 18px;
        padding: 12px;
      }
    }
  </style>

</head>
<body>

  <h1>Entra nel gioco</h1>
  <p>Inserisci il tuo nome per iniziare</p>

  <input id="nome" type="text" placeholder="Il tuo nome">

  <button class="btn" onclick="entra()">🚀 Entra</button>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB03V-a3cKIJk3DufqKK353Y7hEBwb_KaA",
      authDomain: "meme-royale-100c0.firebaseapp.com",
      databaseURL: "https://meme-royale-100c0-default-rtdb.firebaseio.com",
      projectId: "meme-royale-100c0",
      storageBucket: "meme-royale-100c0.appspot.com",
      messagingSenderId: "424280204822",
      appId: "1:424280204822:web:1db163053c0f25754db737"
    };

    firebase.initializeApp(firebaseConfig);

    function entra() {
      const nome = document.getElementById("nome").value.trim();
      if (!nome) {
        alert("Inserisci un nome!");
        return;
      }

      const ref = firebase.database().ref("giocatori").push();
      ref.set({ nome: nome });

      // Vai alla pagina di gioco
      window.location.href = "squadra.html?id=" + ref.key;
    }
  </script>

</body>
</html>
