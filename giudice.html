<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Pannello Giudice</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff0080, #ff8c00);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 20px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    button {
      padding: 12px 20px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .meme {
      width: 100%;
      border-radius: 15px;
      border: 5px solid transparent;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
      transition: 0.25s;
      cursor: pointer;
    }

    .winner {
      border-color: #00ff88;
      box-shadow: 0 0 30px #00ff88;
      transform: scale(1.1);
    }
  </style>

</head>
<body>

  <h1>Pannello Giudice</h1>

  <button onclick="startTimer(20)">⏳ Avvia timer 20s</button>

  <div id="grid" class="grid"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB03V-a3cKIJk3DufqKK353Y7hEBwb_KaA",
      authDomain: "meme-royale-100c0.firebaseapp.com",
      databaseURL: "https://meme-royale-100c0-default-rtdb.firebaseio.com",
      projectId: "meme-royale-100c0",
      storageBucket: "meme-royale-100c0.appspot.com",
      messagingSenderId: "424280204822",
      appId: "1:424280204822:web:1db163053c0f25754db737"
    };

    firebase.initializeApp(firebaseConfig);

    const grid = document.getElementById("grid");

    firebase.database().ref("scelte").on("value", snap => {
      const scelte = snap.val();
      grid.innerHTML = "";

      if (!scelte) return;

      Object.keys(scelte).forEach(id => {
        const memeNum = scelte[id].meme;
        const img = document.createElement("img");
        img.src = "meme/" + memeNum + ".jpeg";
        img.className = "meme";
        img.id = "meme-" + id;
        img.onclick = () => scegliVincitore(id);
        grid.appendChild(img);
      });
    });

    function scegliVincitore(id) {
      firebase.database().ref("gioco/vincitore").set({ id: id });

      // AGGIUNTA PUNTEGGIO
      firebase.database().ref("giocatori/" + id + "/nome").once("value", snap => {
        const nome = snap.val();

        firebase.database().ref("punteggi/" + nome).transaction(p => {
          return (p || 0) + 1;
        });
      });

      document.querySelectorAll(".meme").forEach(m => m.classList.remove("winner"));
      const winnerImg = document.getElementById("meme-" + id);
      if (winnerImg) winnerImg.classList.add("winner");
    }

    function startTimer(seconds) {
      firebase.database().ref("gioco/timer").set(seconds);

      let interval = setInterval(() => {
        seconds--;
        firebase.database().ref("gioco/timer").set(seconds);

        if (seconds <= 0) {
          clearInterval(interval);
        }
      }, 1000);
    }
  </script>

</body>
</html>
