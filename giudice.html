      margin: 0;

      margin-bottom: 20px;

      padding: 20px;
      border-radius: 15px;
      margin-bottom: 20px;
      font-size: 24px;
      font-weight: bold;
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    button {
      padding: 12px 20px;
      font-size: 20px;
      border-radius: 10px;
      border: none;
      margin-bottom: 20px;
      cursor: pointer;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .meme {
      width: 100%;
      border-radius: 15px;
      border: 5px solid transparent;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
      transition: 0.25s;
      cursor: pointer;
    }

    .winner {
      border-color: #00ff88;
      box-shadow: 0 0 30px #00ff88;
      transform: scale(1.1);
    }
  </style>

    // 🔥 MOSTRA LA FRASE IN TEMPO REALE
    firebase.database().ref("gioco/frase").on("value", snap => {
      fraseBox.innerText = snap.val() || "Premi 'Nuovo Round' per generare una frase";
    });

    // 🔥 MOSTRA I MEME INVIATI
    firebase.database().ref("scelte").on("value", snap => {
      const scelte = snap.val();
      grid.innerHTML = "";

      if (!scelte) return;

      Object.keys(scelte).forEach(id => {
        const memeNum = scelte[id].meme;
        const img = document.createElement("img");
        img.src = "meme/" + memeNum + ".jpeg";
        img.className = "meme";
        img.id = "meme-" + id;
        img.onclick = () => scegliVincitore(id);
        grid.appendChild(img);
      });
    });

    function scegliVincitore(id) {
      firebase.database().ref("gioco/vincitore").set({ id: id });

      firebase.database().ref("punteggi/" + id).transaction(p => {
        return (p || 0) + 1;
      });


      document.querySelectorAll(".meme").forEach(m => m.classList.remove("winner"));
      const winnerImg = document.getElementById("meme-" + id);
      if (winnerImg) winnerImg.classList.add("winner");
    }

    function startTimer(seconds) {
      firebase.database().ref("gioco/timer").set(seconds);

      let interval = setInterval(() => {
        seconds--;
        firebase.database().ref("gioco/timer").set(seconds);

        if (seconds <= 0) {
          clearInterval(interval);
        }
      }, 1000);
    }

    // 🔥 NUOVO ROUND COMPLETO
    function nuovoRound() {
      // 1. Genera nuova frase
      const frase = frasi[Math.floor(Math.random() * frasi.length)];
      firebase.database().ref("gioco/frase").set(frase);

      // 2. Reset scelte
      firebase.database().ref("scelte").set(null);

      // 3. Reset vincitore
      firebase.database().ref("gioco/vincitore").set(null);

      // 4. Reset timer
      firebase.database().ref("gioco/timer").set(0);

      // 5. Pulisce la griglia
      grid.innerHTML = "";
    }
  </script>
