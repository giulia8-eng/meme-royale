<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Schermo di gioco</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff0080, #ff8c00);
      color: white;
      text-align: center;
      padding: 40px 20px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 46px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    h2 {
      margin: 10px 0;
      font-size: 32px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 25px;
      margin-top: 20px;
    }

    .meme {
      width: 100%;
      border-radius: 15px;
      border: 5px solid transparent;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
      transition: 0.3s;
      animation: fadeMeme 0.5s ease-out;
    }

    @keyframes fadeMeme {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .winner {
      border-color: #00ff88;
      box-shadow: 0 0 35px #00ff88;
      transform: scale(1.1);
      animation: winnerPulse 1s infinite alternate ease-in-out;
    }

    @keyframes winnerPulse {
      from { transform: scale(1.1); }
      to { transform: scale(1.15); }
    }

    @media (max-width: 600px) {
      h1 { font-size: 32px; }
      h2 { font-size: 24px; }
      .grid {
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 15px;
      }
    }
  </style>

</head>
<body>

  <h1>Meme Royale – Round in corso</h1>

  <!-- TIMER -->
  <h2 id="timer">⏳ 20</h2>

  <!-- CLASSIFICA -->
  <h2>🏆 Classifica</h2>
  <ul id="classifica" style="list-style:none; padding:0; font-size:22px;"></ul>

  <div id="grid" class="grid"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB03V-a3cKIJk3DufqKK353Y7hEBwb_KaA",
      authDomain: "meme-royale-100c0.firebaseapp.com",
      databaseURL: "https://meme-royale-100c0-default-rtdb.firebaseio.com",
      projectId: "meme-royale-100c0",
      storageBucket: "meme-royale-100c0.appspot.com",
      messagingSenderId: "424280204822",
      appId: "1:424280204822:web:1db163053c0f25754db737"
    };

    firebase.initializeApp(firebaseConfig);

    const grid = document.getElementById("grid");

    // MOSTRA MEME
    firebase.database().ref("scelte").on("value", snap => {
      const scelte = snap.val();
      grid.innerHTML = "";

      if (!scelte) return;

      Object.keys(scelte).forEach(id => {
        const memeNum = scelte[id].meme;
        const img = document.createElement("img");
        img.src = "meme/" + memeNum + ".jpeg";
        img.className = "meme";
        img.id = "meme-" + id;
        grid.appendChild(img);
      });
    });

    // TIMER
    firebase.database().ref("gioco/timer").on("value", snap => {
      const t = snap.val();
      if (t !== null) {
        document.getElementById("timer").textContent = "⏳ " + t;
      }
    });

    // CLASSIFICA
    firebase.database().ref("punteggi").on("value", snap => {
      const punteggi = snap.val();
      const lista = document.getElementById("classifica");
      lista.innerHTML = "";

      if (!punteggi) return;

      const arr = Object.entries(punteggi).sort((a,b) => b[1] - a[1]);

      arr.forEach(([nome, punti]) => {
        const li = document.createElement("li");
        li.textContent = nome + ": " + punti + " punti";
        lista.appendChild(li);
      });
    });

    // VINCITORE
    firebase.database().ref("gioco/vincitore").on("value", snap => {
      const v = snap.val();

      document.querySelectorAll(".meme").forEach(m => m.classList.remove("winner"));

      if (!v) return;

      const winnerImg = document.getElementById("meme-" + v.id);
      if (winnerImg) winnerImg.classList.add("winner");
    });

    // NUOVO ROUND
    firebase.database().ref("scelte").on("child_removed", () => {
      grid.innerHTML = "";
    });
  </script>

</body>
</html>
