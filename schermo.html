<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Schermo di gioco</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff0080, #ff8c00);
      color: white;
      text-align: center;
      padding: 20px;
      animation: fadeIn 0.8s ease-out;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    h1 {
      font-size: 52px; /* PIÙ GRANDE */
      margin-bottom: 30px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    /* 🔥 BARRA SUPERIORE: TIMER A SINISTRA, CLASSIFICA A DESTRA */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      width: 100%;
      max-width: 1400px;
      margin: 0 auto;
      padding: 0 20px;
      margin-bottom: 40px; /* PIÙ SPAZIO DAI MEME */
    }

    #timer {
      font-size: 50px; /* PIÙ GRANDE */
      font-weight: bold;
      text-align: left;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    #classifica-box h2 {
      font-size: 40px; /* PIÙ GRANDE */
      margin-bottom: 10px;
    }

    #classifica {
      list-style: none;
      padding: 0;
      margin: 0;
      font-size: 28px; /* PIÙ GRANDE */
      line-height: 1.6;
      text-align: right;
    }

    /* 🔥 GRIGLIA MEME */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 30px;
      margin-top: 20px;
      width: 100%;
      max-width: 1500px;
      margin-left: auto;
      margin-right: auto;
    }

    .meme {
      width: 100%;
      border-radius: 15px;
      border: 5px solid transparent;
      box-shadow: 0 0 20px rgba(255,255,255,0.3);
      transition: 0.3s;
      animation: fadeMeme 0.5s ease-out;
    }

    @keyframes fadeMeme {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }

    .winner {
      border-color: #00ff88;
      box-shadow: 0 0 35px #00ff88;
      transform: scale(1.1);
      animation: winnerPulse 1s infinite alternate ease-in-out;
    }

    @keyframes winnerPulse {
      from { transform: scale(1.1); }
      to { transform: scale(1.15); }
    }

    @media (max-width: 700px) {
      .top-bar {
        flex-direction: column;
        text-align: center;
        margin-bottom: 20px;
      }
      #timer, #classifica-box {
        text-align: center;
      }
    }
  </style>

</head>
<body>

  <h1>Meme Royale – Round in corso</h1>

  <!-- 🔥 TIMER A SINISTRA — CLASSIFICA A DESTRA -->
  <div class="top-bar">
    <div id="timer">⏳ 60</div>

    <div id="classifica-box">
    <h2>🏆 Classifica</h2>
    <ul id="classifica"></ul>

    <!-- 🔥 PULSANTE RESET -->
    <button id="reset-btn" style="
      margin-top: 15px;
      padding: 10px 20px;
      font-size: 20px;
      border: none;
      border-radius: 10px;
      background: #ff4444;
      color: white;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    ">
      🔄 Reset Classifica
    </button>
    </div>

  </div>

  <!-- MEME -->
  <div id="grid" class="grid"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyB03V-a3cKIJk3DufqKK353Y7hEBwb_KaA",
      authDomain: "meme-royale-100c0.firebaseapp.com",
      databaseURL: "https://meme-royale-100c0-default-rtdb.firebaseio.com",
      projectId: "meme-royale-100c0",
      storageBucket: "meme-royale-100c0.appspot.com",
      messagingSenderId: "424280204822",
      appId: "1:424280204822:web:1db163053c0f25754db737"
    };

    firebase.initializeApp(firebaseConfig);

    const grid = document.getElementById("grid");
    const classificaEl = document.getElementById("classifica");

    // 🔥 MEME IN TEMPO REALE
    firebase.database().ref("scelte").on("value", snap => {
      const scelte = snap.val();
      grid.innerHTML = "";

      if (!scelte) return;

      Object.keys(scelte).forEach(id => {
        const memeNum = scelte[id].meme;
        const img = document.createElement("img");
        img.src = "meme/" + memeNum + ".jpeg";
        img.className = "meme";
        img.id = "meme-" + id;
        grid.appendChild(img);
      });
    });

    // 🔥 TIMER
    firebase.database().ref("gioco/timer").on("value", snap => {
      const t = snap.val();
      if (t !== null) {
        document.getElementById("timer").textContent = "⏳ " + t;
      }
    });

    // 🔥 CLASSIFICA
    firebase.database().ref("punteggi").on("value", snap => {
      const dati = snap.val() || {};
      classificaEl.innerHTML = "";

      const entries = Object.entries(dati).sort((a, b) => b[1] - a[1]);

      entries.forEach(([nome, punti]) => {
        classificaEl.innerHTML += `<li><strong>${nome}:</strong> ${punti} punti</li>`;
      });
      
    });

    // 🔥 VINCITORE
    firebase.database().ref("gioco/vincitore").on("value", snap => {
      const v = snap.val();

      document.querySelectorAll(".meme").forEach(m => m.classList.remove("winner"));

      if (!v) return;

      const winnerImg = document.getElementById("meme-" + v.id);
      if (winnerImg) winnerImg.classList.add("winner");
    });

    // 🔥 RESET COMPLETO DEL GIOCO
    document.getElementById("reset-btn").onclick = () => {
      if (!confirm("Sei sicuro di voler resettare tutto?")) return;

      firebase.database().ref("scelte").remove();
      firebase.database().ref("punteggi").remove();
      firebase.database().ref("giocatori").remove();
      firebase.database().ref("gioco/vincitore").remove();
      firebase.database().ref("gioco/timer").set(60);

      alert("Gioco resettato!");
    };

  </script>

</body>
</html>
