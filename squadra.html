<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Squadra - Meme Royale</title>
    <style>
        body { font-family: Arial; text-align: center; padding: 20px; }
        #frase-round { 
            font-size: 22px; 
            margin: 20px 0; 
            font-weight: bold; 
            color: #333;
        }
        input[type="file"] {
            margin: 20px 0;
            font-size: 18px;
        }
        button {
            padding: 12px 20px;
            font-size: 18px;
            background: blue;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>

    <h1>Scegli il tuo meme</h1>

    <!-- 🔥 Qui appare la frase del round -->
    <div id="frase-round">Caricamento frase...</div>

    <input type="file" accept="image/*">
    <br>
    <button>Invia Meme</button>

    <script>
        // 🔥 Recupera la frase salvata dal giudice
        const frase = localStorage.getItem("frase_corrente");

        if (frase) {
            document.getElementById("frase-round").innerText = frase;
        } else {
            document.getElementById("frase-round").innerText =
                "In attesa che il giudice inizi il round...";
        }
    </script>

</body>
</html>
