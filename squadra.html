<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scegli il tuo meme</title>
  <style>
    body { font-family: Arial; padding: 20px; }
    .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 20px;
  }

  body {
    margin: 0;
    font-family: 'Arial', sans-serif;
    background: linear-gradient(135deg, #ff0080, #ff8c00);
    color: white;
    text-align: center;
    padding: 40px 20px;
  }

  h1 {
    font-size: 50px;
    margin-bottom: 10px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
  }

  h2 {
    font-size: 30px;
    margin-bottom: 20px;
    text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
  }

  p {
    font-size: 20px;
    margin-bottom: 40px;
  }

  .btn {
    display: block;
    width: 260px;
    margin: 15px auto;
    padding: 15px;
    background: white;
    color: #ff0080;
    font-size: 22px;
    font-weight: bold;
    border-radius: 12px;
    text-decoration: none;
    transition: 0.2s;
  }

  .btn:hover {
    transform: scale(1.08);
    background: #ffe6f2;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
    gap: 25px;
    margin-top: 30px;
  }

  .meme {
    width: 100%;
    border-radius: 15px;
    border: 5px solid transparent;
    box-shadow: 0 0 20px rgba(255,255,255,0.3);
    transition: 0.3s;
  }

  .meme:hover {
    transform: scale(1.05);
    box-shadow: 0 0 25px rgba(255,255,255,0.6);
  }

  .winner {
    border-color: #00ff88;
    box-shadow: 0 0 30px #00ff88;
    transform: scale(1.1);
  }

    .meme {
      width: 75%;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s;
    }
    .meme:hover {
      transform: scale(1.05);
    }
  </style>
</head>
<body>

<h2>Scegli il tuo meme</h2>
<p id="status"></p>

<div class="grid" id="grid"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<script>
  const firebaseConfig = {
    apiKey: "AIzaSyB03V-a3cKIJk3DufqKK353Y7hEBwb_KaA",
    authDomain: "meme-royale-100c0.firebaseapp.com",
    databaseURL: "https://meme-royale-100c0-default-rtdb.firebaseio.com",
    projectId: "meme-royale-100c0",
    storageBucket: "meme-royale-100c0.appspot.com",
    messagingSenderId: "424280204822",
    appId: "1:424280204822:web:1db163053c0f25754db737"
  };

  firebase.initializeApp(firebaseConfig);

  const idGiocatore = localStorage.getItem("idGiocatore");
  const NUM_MEME = 3; // CAMBIA QUESTO NUMERO QUANDO AGGIUNGI MEME

  const grid = document.getElementById("grid");
  const status = document.getElementById("status");

  // Carica i meme automaticamente
  for (let i = 1; i <= NUM_MEME; i++) {
    const img = document.createElement("img");
    img.src = "meme/" + i + ".jpeg";
    img.className = "meme";
    img.onclick = () => scegliMeme(i);
    grid.appendChild(img);
  }

  function scegliMeme(num) {
    firebase.database().ref("scelte/" + idGiocatore).set({
      meme: num,
      timestamp: Date.now()
    });

    status.innerText = "Hai scelto il meme #" + num + ". Attendi il giudice.";
    grid.style.display = "none";
  }
</script>

</body>
</html>
