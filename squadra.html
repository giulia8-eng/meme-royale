<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Scegli il tuo Meme</title>

  <style>
    body {
      margin: 0;
      font-family: 'Arial', sans-serif;
      background: linear-gradient(135deg, #ff0080, #ff8c00);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
      text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
    }

    /* 🔥 BOX FRASE – STESSO STILE DEL GIUDICE */
    #frase-box {
      background: rgba(255,255,255,0.35);
      padding: 20px;
      border-radius: 15px;
      margin: 20px auto;
      font-size: 26px;
      font-weight: bold;
      width: 90%;
      max-width: 650px;
      color: black;
      text-shadow: 1px 1px 3px rgba(255,255,255,0.8);
      box-shadow: 0 0 15px rgba(0,0,0,0.2);
    }

    h2 {
      font-size: 26px;
      margin-top: 30px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 20px;
      margin-top: 20px;
    }

    .meme {
      width: 100%;
      border-radius: 15px;
      cursor: pointer;
      transition: 0.2s;
      border: 4px solid transparent;
    }

    .meme:hover {
      transform: scale(1.05);
      border-color: #00ff88;
    }
  </style>
</head>
<body>

  <h1>🎯 Frase del Round</h1>

  <!-- 🔥 FRASE DEL ROUND (STESSO STILE DEL GIUDICE) -->
  <div id="frase-box">In attesa del giudice...</div>

  <h2>Tocca un meme per selezionarlo</h2>

  <div id="grid" class="grid"></div>

  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

  <script>

    // Prendi il NOME passato da gioca.html
    const urlParams = new URLSearchParams(window.location.search);
    const nome = urlParams.get("nome");

    const firebaseConfig = {
      apiKey: "AIzaSyB03V-a3cKIJk3DufqKK353Y7hEBwb_KaA",
      authDomain: "meme-royale-100c0.firebaseapp.com",
      databaseURL: "https://meme-royale-100c0-default-rtdb.firebaseio.com",
      projectId: "meme-royale-100c0",
      storageBucket: "meme-royale-100c0.appspot.com",
      messagingSenderId: "424280204822",
      appId: "1:424280204822:web:1db163053c0f25754db737"
    };

    firebase.initializeApp(firebaseConfig);

    const fraseBox = document.getElementById("frase-box");
    const grid = document.getElementById("grid");

    // 🔥 MOSTRA LA FRASE DEL ROUND IN TEMPO REALE
    firebase.database().ref("gioco/frase").on("value", snap => {
      fraseBox.innerText = snap.val() || "In attesa del giudice...";
    });

    // 🔥 CARICA I MEME DISPONIBILI (1–101)
    for (let i = 1; i <= 101; i++) {
      const img = document.createElement("img");
      img.src = "meme/" + i + ".jpeg";
      img.className = "meme";
      img.onclick = () => inviaMeme(i);
      grid.appendChild(img);
    }

    // 🔥 INVIA LA SCELTA DEL MEME
    function inviaMeme(num) {
      firebase.database().ref("scelte/" + nome).set({
        meme: num
      });

      alert("Meme inviato!")
      
    }

  </script>

</body>
</html>
